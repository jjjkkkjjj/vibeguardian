name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cargo-deb (Linux only)
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: cargo install cargo-deb --locked

      - name: Build (release)
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          BIN=vg
          VER="${{ github.ref_name }}"
          TGT="${{ matrix.target }}"

          cp "target/${TGT}/release/${BIN}" .

          # versioned filename  (e.g. vg-v0.2.0-aarch64-apple-darwin.tar.gz)
          TARBALL_VER="vg-${VER}-${TGT}.tar.gz"
          tar czf "$TARBALL_VER" "$BIN"

          # version-free filename  (e.g. vg-aarch64-apple-darwin.tar.gz)
          TARBALL_LATEST="vg-${TGT}.tar.gz"
          cp "$TARBALL_VER" "$TARBALL_LATEST"

          echo "ASSET_VER=$TARBALL_VER"       >> "$GITHUB_ENV"
          echo "ASSET_LATEST=$TARBALL_LATEST" >> "$GITHUB_ENV"

      - name: Package .deb (Linux only)
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        shell: bash
        run: |
          cargo deb --target ${{ matrix.target }} --no-build
          DEB_SRC=$(ls target/${{ matrix.target }}/debian/vg_*.deb | head -1)
          cp "$DEB_SRC" vg-x86_64-linux.deb
          echo "ASSET_DEB=vg-x86_64-linux.deb" >> "$GITHUB_ENV"

      - name: Package (Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $BIN = "vg.exe"
          $ZIP = "vg-${{ github.ref_name }}-${{ matrix.target }}.zip"
          Copy-Item "target/${{ matrix.target }}/release/$BIN" .
          Compress-Archive -Path $BIN -DestinationPath $ZIP
          "ASSET=$ZIP" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload tarballs to GitHub Release
        if: matrix.archive == 'tar.gz'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.ASSET_VER }}
            ${{ env.ASSET_LATEST }}
          generate_release_notes: true

      - name: Upload .deb to GitHub Release
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ASSET_DEB }}

      - name: Upload to GitHub Release (Windows)
        if: matrix.archive == 'zip'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ASSET }}
          generate_release_notes: true

  dispatch-homebrew:
    name: Dispatch Homebrew formula update
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Trigger homebrew-vibeguardian update
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          repository: jjjkkkjjj/homebrew-vibeguardian
          event-type: release
          client-payload: '{"version": "${{ github.ref_name }}"}'

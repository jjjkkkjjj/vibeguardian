name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build (release)
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          BIN=vs
          TARBALL=vs-${{ github.ref_name }}-${{ matrix.target }}.tar.gz
          cp target/${{ matrix.target }}/release/$BIN .
          tar czf "$TARBALL" "$BIN"
          echo "ASSET=$TARBALL" >> "$GITHUB_ENV"

      - name: Package (Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $BIN = "vs.exe"
          $ZIP = "vs-${{ github.ref_name }}-${{ matrix.target }}.zip"
          Copy-Item "target/${{ matrix.target }}/release/$BIN" .
          Compress-Archive -Path $BIN -DestinationPath $ZIP
          "ASSET=$ZIP" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ASSET }}
          generate_release_notes: true
